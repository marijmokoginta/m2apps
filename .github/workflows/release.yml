name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        target:
          - windows-amd64
          - linux-amd64
          - darwin-amd64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package target
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/windows dist/linux dist/macos

          case "${{ matrix.target }}" in
            windows-amd64)
              GOOS=windows GOARCH=amd64 go build -o dist/m2apps-windows-amd64.exe ./main.go
              cp dist/m2apps-windows-amd64.exe dist/windows/m2apps.exe
              (cd dist/windows && zip -r ../m2apps-windows-amd64.zip m2apps.exe)
              echo "ASSET_FILE=m2apps-windows-amd64.zip" >> "$GITHUB_ENV"
              ;;
            linux-amd64)
              GOOS=linux GOARCH=amd64 go build -o dist/m2apps-linux-amd64 ./main.go
              cp dist/m2apps-linux-amd64 dist/linux/m2apps
              chmod +x dist/linux/m2apps
              (cd dist/linux && tar -czf ../m2apps-linux-amd64.tar.gz m2apps)
              echo "ASSET_FILE=m2apps-linux-amd64.tar.gz" >> "$GITHUB_ENV"
              ;;
            darwin-amd64)
              GOOS=darwin GOARCH=amd64 go build -o dist/m2apps-darwin-amd64 ./main.go
              cp dist/m2apps-darwin-amd64 dist/macos/m2apps
              chmod +x dist/macos/m2apps
              (cd dist/macos && tar -czf ../m2apps-darwin-amd64.tar.gz m2apps)
              echo "ASSET_FILE=m2apps-darwin-amd64.tar.gz" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported target: ${{ matrix.target }}"
              exit 1
              ;;
          esac

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-asset
          path: dist/${{ env.ASSET_FILE }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload Windows asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/m2apps-windows-amd64.zip
          asset_name: m2apps-windows-amd64.zip
          asset_content_type: application/zip

      - name: Upload Linux asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/m2apps-linux-amd64.tar.gz
          asset_name: m2apps-linux-amd64.tar.gz
          asset_content_type: application/gzip

      - name: Upload macOS asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/m2apps-darwin-amd64.tar.gz
          asset_name: m2apps-darwin-amd64.tar.gz
          asset_content_type: application/gzip
